name: .NET CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore e-mailsender.slnx

      - name: Format Check
        run: |
          dotnet format whitespace e-mailsender.slnx --verify-no-changes
          dotnet format style e-mailsender.slnx --verify-no-changes

      - name: Build
        run: dotnet build e-mailsender.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test e-mailsender.slnx --configuration Release --no-build --verbosity normal
